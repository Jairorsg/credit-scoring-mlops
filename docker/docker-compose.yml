version: "3.9"

services:

  # ── API de Credit Scoring ───────────────────────────────services:
  credit-scoring-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: credit_scoring_api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
  # ── MLflow Tracking Server ──────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: mlflow_server
    ports:
      - "5000:5000"
    volumes:
      - ../mlruns:/mlruns
    command: >
      bash -c "pip install mlflow --quiet &&
               mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri /mlruns"
    restart: unless-stopped