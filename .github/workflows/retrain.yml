#   Credit Scoring MLOps — Reentrenamiento automático diario
#   Se ejecuta: todos los días a las 2:00 AM UTC

name: Retrain Credit Scoring Model

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest

    # FIX 1: MLflow no acepta file:// sin este env var
    env:
      MLFLOW_ALLOW_FILE_STORE: "true"

    steps:

      # ── 1. Clonar el repositorio (con LFS)
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          lfs: true

      # 2. Configurar Python 3.11 con cache de pip
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install \
            numpy pandas scikit-learn lightgbm \
            imbalanced-learn shap mlflow \
            fastapi uvicorn pydantic \
            joblib pyyaml python-dotenv \
            matplotlib seaborn pyarrow

      # 4. Verificar datos
      - name: Verificar datos
        run: |
          if [ ! -f "data/raw/application_train.csv" ]; then
            echo "ERROR: No se encontró application_train.csv"
            exit 1
          fi
          echo "✓ Datos encontrados"
          python -c "
          import pandas as pd
          df = pd.read_csv('data/raw/application_train.csv')
          print(f'Filas   : {len(df):,}')
          print(f'Columnas: {df.shape[1]}')
          print(f'Primeras columnas: {list(df.columns[:5])}')
          "

      # 5. Reentrenar modelo
      - name: Reentrenar modelo
        run: |
          python pipelines/train_pipeline.py

      # 6. Verificar calidad del modelo
      - name: Verificar calidad del modelo
        run: |
          python - <<'EOF'
          import json
          with open("model/artifacts/metrics.json") as f:
              m = json.load(f)
          auc = m["roc_auc_test"]
          print(f"ROC-AUC Test: {auc:.4f}")
          assert auc >= 0.70, f"ROC-AUC {auc:.4f} por debajo del mínimo aceptable (0.70)"
          print("✓ Calidad del modelo aceptable")
          EOF

      # 7. Guardar artefactos
      # FIX 2: lgbm_model.joblib + preprocessor.joblib fueron
      - name: Subir artefactos del modelo
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts-${{ github.run_number }}
          path: |
            model/artifacts/lgbm_pipeline.joblib
            model/artifacts/feature_names.json
            model/artifacts/metrics.json
          retention-days: 30

      # 8. Resumen final
      - name: Resumen del entrenamiento
        run: |
          python - <<'EOF'
          import json
          with open("model/artifacts/metrics.json") as f:
              m = json.load(f)
          print("════════════════════════════════════")
          print("  RESUMEN DEL REENTRENAMIENTO")
          print("════════════════════════════════════")
          print(f"  ROC-AUC Test      : {m['roc_auc_test']:.4f}")
          print(f"  CV medio (honesto): {m['roc_auc_cv_mean']:.4f} ± {m['roc_auc_cv_std']:.4f}")
          print(f"  Threshold óptimo  : {m['threshold_optimal']:.4f}")
          print(f"  Features          : {m['n_features']}")
          print(f"  Timestamp         : {m['timestamp']}")
          print("════════════════════════════════════")
          EOF